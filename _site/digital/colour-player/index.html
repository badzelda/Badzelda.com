<style>
  html, body {

    grid-template-rows: repeat(4, 60px);
    gap: 10px;

  .tile {
    width: 60px;
    height: 60px;
    background: #00001a;
    cursor: pointer;
    transition: background-color 0.05s linear;
  }
  .caption {
    position: fixed;
    right: 10px;
    bottom: 8px;
    font-size: 10px;
    letter-spacing: 0.05em;
    color: #444;
  }
</style>

const tiles = [{"id": "one", "sound": "allIknow", "onclick": "yellowchange", "stopLoop": true}, {"id": "two", "sound": null, "onclick": "purplechange"}, {"id": "three", "sound": null, "onclick": "bluechange"}, {"id": "four", "sound": "pants", "onclick": "orangechange"}, {"id": "five", "sound": "sendkid", "onclick": "redchange"}, {"id": "six", "sound": null, "onclick": "turquoise3change"}, {"id": "seven", "sound": null, "onclick": "reset"}, {"id": "eight", "sound": "attack", "onclick": "turquoise2change"}, {"id": "nine", "sound": null, "onclick": "reset"}, {"id": "ten", "sound": "gunshot", "onclick": "reset2"}, {"id": "eleven", "sound": "pants", "onclick": "reset"}, {"id": "twelve", "sound": "attack", "onclick": "reset2"}, {"id": "thirteen", "sound": "playme", "onclick": "pinkchange"}, {"id": "fourteen", "sound": null, "onclick": "reset"}, {"id": "fifteen", "sound": "gunshot", "onclick": "reset2"}, {"id": "sixteen", "sound": "revolve", "onclick": "limechange"}];
const defaultPalette = {"one": "blue", "two": "brightgreen", "three": "darkgreen", "four": "emerald", "five": "fawn", "six": "lime", "seven": "orange", "eight": "pink", "nine": "purple1", "ten": "purple2", "eleven": "purple3", "twelve": "red", "thirteen": "turquoise1", "fourteen": "turquoise2", "fifteen": "turquoise3", "sixteen": "yellow"};
const reset2Palette = {"one": "yellow", "two": "purple3", "three": "pink", "four": "emerald", "five": "pink", "six": "lime", "seven": "turquoise1", "eight": "pink", "nine": "purple1", "ten": "lime", "eleven": "brightgreen", "twelve": "blue", "thirteen": "orange", "fourteen": "pink", "fifteen": "turquoise3", "sixteen": "yellow"};

let palette = Object.assign({}, defaultPalette);
const audioCache = {};
let loopAudio = null;

function getAudio(name) {
  if (!audioCache[name]) {
    audioCache[name] = new Audio('data:audio/mpeg;base64,' + audioB64[name]);
  }
  return audioCache[name];
}

function playSound(name) {
  const a = getAudio(name).cloneNode();
  a.volume = 1.0;
  a.play().catch(() => {});
}

function stopLoop() {
  if (loopAudio) {
    loopAudio.pause();
    loopAudio.currentTime = 0;
  }
}

function setAll(colourKey) {
  tiles.forEach(t => { palette[t.id] = colourKey; });
}

function setAlternating(a, b) {
  tiles.forEach((t, i) => { palette[t.id] = (i % 2 === 0) ? a : b; });
}

const paletteFns = {
  yellowchange: () => setAll('yellow'),
  purplechange: () => setAll('purple1'),
  bluechange: () => setAll('blue'),
  orangechange: () => setAll('orange'),
  redchange: () => setAll('red'),
  limechange: () => setAll('lime'),
  turquoise3change: () => setAll('turquoise3'),
  turquoise2change: () => setAlternating('turquoise2', 'emerald'),
  pinkchange: () => setAlternating('pink', 'orange'),
  reset: () => { palette = Object.assign({}, defaultPalette); },
  reset2: () => { palette = Object.assign({}, reset2Palette); },
};

function buildGrid() {
  const grid = document.getElementById('grid');
  tiles.forEach(t => {
    const div = document.createElement('div');
    div.className = 'tile';
    div.dataset.id = t.id;
    div.addEventListener('mouseenter', () => {
      div.style.backgroundColor = swatches[palette[t.id]];
      if (t.sound) playSound(t.sound);
    });
    div.addEventListener('click', () => {
      paletteFns[t.onclick]();
      if (t.stopLoop) stopLoop();
    });
    grid.appendChild(div);
  });
}

document.getElementById('gate').addEventListener('click', function enter() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('stage').style.display = 'flex';
  buildGrid();
  loopAudio = getAudio('pantsloop');
  loopAudio.loop = true;
  loopAudio.volume = 0.6;
  loopAudio.play().catch(() => {});
}, { once: true });
</script>
