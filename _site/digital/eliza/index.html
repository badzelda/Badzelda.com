<script>
// Faithful port of the classic Weizenbaum/Hayden ELIZA algorithm,
// driven by the actual 1985 Eliza.script data (see eliza_data.js).

function makeEliza(data) {
  const decompCounters = new Map(); // per-decomp round-robin index
  let memory = [];

  function stripPunct(s) {
    return s.replace(/[.,!?;:"]/g, ' ').replace(/\s+/g, ' ').trim();
  }

  function wordSub(words, map) {
    const out = [];
    for (const w of words) {
      if (map[w]) out.push(...map[w]);
      else out.push(w);
    }
    return out;
  }

  function preprocess(input) {
    let words = stripPunct(input.toLowerCase()).split(' ').filter(Boolean);
    words = wordSub(words, data.pre);
    return words;
  }

  function isSynonym(word, target) {
    const group = data.synon[target];
    if (!group) return word === target;
    return group.includes(word);
  }

  // Backtracking matcher: tokens may be '*', '@word', or a literal word.
  // Returns array of captured group strings (one per '*' or '@word' token),
  // or null if no match.
  function matchTokens(tokens, words) {
    const groups = [];

    function rec(ti, wi) {
      if (ti === tokens.length) return wi === words.length ? [] : null;
      const tok = tokens[ti];

      if (tok === '*') {
        // try longest match first, shrinking - classic ELIZA favours
        // the shortest wildcard span consistent with a full match, but
        // trying long-to-short here reliably finds a valid parse when
        // one exists for these simple patterns.
        for (let end = words.length; end >= wi; end--) {
          const rest = rec(ti + 1, end);
          if (rest !== null) return [words.slice(wi, end).join(' '), ...rest];
        }
        return null;
      }

      if (tok.startsWith('@')) {
        const target = tok.slice(1);
        if (wi < words.length && isSynonym(words[wi], target)) {
          const rest = rec(ti + 1, wi + 1);
          if (rest !== null) return [words[wi], ...rest];
        }
        return null;
      }

      // literal word
      if (wi < words.length && words[wi] === tok) {
        return rec(ti + 1, wi + 1);
      }
      return null;
    }

    const result = rec(0, 0);
    return result;
  }

  function findKey(words) {
    let best = null;
    for (let i = 0; i < words.length; i++) {
      const w = words[i];
      const key = data.keys.find(k => k.name === w);
      if (key && key.name !== 'xnone') {
        if (!best || key.weight > best.weight) best = key;
      }
    }
    return best || data.keys.find(k => k.name === 'xnone');
  }

  function nextReasmb(decompId, list) {
    const i = decompCounters.get(decompId) || 0;
    decompCounters.set(decompId, (i + 1) % list.length);
    return list[i];
  }

  function fillTemplate(template, groups) {
    return template.replace(/\((\d+)\)/g, (_, n) => {
      const idx = parseInt(n, 10) - 1;
      const raw = groups[idx] || '';
      const words = wordSub(raw.split(' ').filter(Boolean), data.post);
      return words.join(' ');
    });
  }

  function keyByName(name) {
    return data.keys.find(k => k.name === name);
  }

  // Runs the decomposition process for a given key against the words.
  // Populates memory as a side effect. Returns the response string, or
  // null if nothing in this key matched (caller falls back to xnone).
  function runKey(key, words, depth) {
    if (depth > 10) return "I am not sure I understand you fully.";

    for (let di = 0; di < key.decomps.length; di++) {
      const decomp = key.decomps[di];
      const groups = matchTokens(decomp.tokens, words);
      if (groups === null) continue;

      const decompId = key.name + '#' + di;

      if (decomp.mem) {
        // Record a reflection for later use when we hit xnone, but keep
        // looking for this turn's real response.
        const tpl = nextReasmb(decompId + ':mem', decomp.reasmb);
        memory.push(fillTemplate(tpl, groups));
        continue;
      }

      const tpl = nextReasmb(decompId, decomp.reasmb);
      const gotoMatch = /^goto\s+(\S+)$/i.exec(tpl.trim());
      if (gotoMatch) {
        const target = keyByName(gotoMatch[1]);
        if (target) return runKey(target, words, depth + 1);
        continue;
      }
      return fillTemplate(tpl, groups);
    }
    return null;
  }

  function respond(input) {
    const trimmed = input.trim().toLowerCase();
    if (data.quit.includes(trimmed)) {
      return { text: data.final[0], quit: true };
    }

    const words = preprocess(input);
    let key = findKey(words);
    let out = runKey(key, words, 0);

    if (out === null) {
      // truly nothing matched (shouldn't usually happen - xnone has a
      // catch-all '*' decomp) - prefer a saved memory if we have one
      key = keyByName('xnone');
      out = runKey(key, words, 0);
    }

    if (key.name === 'xnone' && memory.length) {
      out = memory.shift();
    }

    return { text: out, quit: false };
  }

  return {
    respond,
    greeting: () => data.initial[0],
  };
}

<script>
(function () {
  "use strict";

  const eliza = makeEliza(ELIZA_DATA);
  const gate = document.getElementById("gate");
  const app = document.getElementById("app");
  const transcript = document.getElementById("transcript");
  const input = document.getElementById("textInput");
  let ended = false;

  function addLine(role, text) {
    const p = document.createElement("p");
    p.className = role;
    p.textContent = text;
    transcript.appendChild(p);
    transcript.scrollTop = transcript.scrollHeight;
  }

  function start() {
    gate.style.display = "none";
    app.style.display = "flex";
    addLine("eliza", eliza.greeting());
    input.focus();
  }

  gate.addEventListener("click", start);

  input.addEventListener("keydown", function (e) {
    if (e.key !== "Enter" || ended) return;
    const text = input.value.trim();
    if (!text) return;
    addLine("you", text);
    input.value = "";
    const result = eliza.respond(text);
    addLine("eliza", result.text);
    if (result.quit) {
      ended = true;
      input.placeholder = "(conversation ended)";
      input.disabled = true;
    }
  });
})();
</script>
