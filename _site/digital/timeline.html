<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>timeline</title>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #FF9900;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #stage {
    width: 580px;
    height: 400px;
  }
  #stage ruffle-object, #stage embed {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<div id="stage"></div>
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();
  player.style.width = "100%";
  player.style.height = "100%";
  document.getElementById("stage").appendChild(player);
  player.load("/digital/toys/timeline.swf");
</script>
</body>
</html>
