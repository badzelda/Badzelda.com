const INTERVAL_MS = 4000;
const el = document.getElementById('poem');

let lastIndex = -1;

function pickIndex() {
  if (ideas.length <= 1) return 0;
  let i;
  do {
    i = Math.floor(Math.random() * ideas.length);
  } while (i === lastIndex);
  return i;
}

function showNextLine() {
  el.classList.add('fade');
  setTimeout(() => {
    const i = pickIndex();
    lastIndex = i;
    el.textContent = ideas[i];
    el.classList.remove('fade');
  }, 300);
}

// first line immediately, no fade-in wait
(function init() {
  const i = pickIndex();
  lastIndex = i;
  el.textContent = ideas[i];
})();

setInterval(showNextLine, INTERVAL_MS);
</script>
