name: Deploy to pair.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx @11ty/eleventy

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PAIR_SSH_PRIVATE_KEY }}

      - name: Trust pair.com host key
        run: ssh-keyscan -H "${{ secrets.PAIR_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            _site/ \
            "${{ secrets.PAIR_USER }}@${{ secrets.PAIR_HOST }}:${{ secrets.PAIR_TARGET_PATH }}/"
